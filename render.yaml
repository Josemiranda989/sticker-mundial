# Blueprint de Render (debe vivir en la RAIZ del repo).
# En Render: New + -> Blueprint -> seleccionar este repo.
# El campo rootDir le dice a Render que el servicio vive en backend/.
services:
  - type: web
    name: sticker-mundial-api
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev: NODE_ENV=production hace que npm omita las devDependencies
    # (typescript, @types/*, prisma, tsx). El build las necesita SI o SI.
    buildCommand: npm install --include=dev && npm run build && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # se carga manual en el dashboard (secreto)
      - key: DIRECT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false # la URL de Vercel; se completa despues de deployar el front
      - key: NODE_ENV
        value: production
